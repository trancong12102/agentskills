id: regex-ipv4
language: TypeScript
message: "Hand-rolled IPv4 regex. Use zod z.string().ip({ version: 'v4' }) — handles octet range correctly."
severity: info
rule:
  any:
    - pattern: "/^(\\d{1,3}\\.){3}\\d{1,3}$/.test($STR)"
    - pattern: "/^(?:\\d{1,3}\\.){3}\\d{1,3}$/.test($STR)"
metadata:
  replace_catalog: "import { z } from 'zod'; z.string().ip({ version: 'v4' }).safeParse($STR).success"
  priority: P2
  fallback_regex: "/\\^\\(\\?:\\\\d\\{1,3\\}\\\\\\.\\)\\{3\\}\\\\d\\{1,3\\}\\$/"
  notes: "Common IPv4 regex accepts 999.999.999.999. zod validates each octet ≤ 255."
